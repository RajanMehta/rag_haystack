services:
  haystack-api:
    build: ./
    image: haystack_api:dev
    command: uvicorn --app-dir=haystack_api/ application:app --reload --host 0.0.0.0 --port 31415
    networks:
      - main-net
    ports:
      - 31415:31415
    expose:
      - "31415"
    environment:
      - HAYSTACK_TELEMETRY_ENABLED=${HAYSTACK_TELEMETRY_ENABLED:-False}
      - QDRANT_HTTP_PORT=${QDRANT_HTTP_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant-server}
      - REDIS_HOST=${REDIS_HOST:-redis-server}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FILE_UPLOAD_PATH=/tmp/file-upload
      - HF_TOKEN=${HF_TOKEN:-}
      - PIPELINE_CONFIG=${PIPELINE_CONFIG:-en_gen}
      - LOCAL_MODEL_DIR=${LOCAL_MODEL_DIR:-}
      - HF_HOME=${HF_HOME:-/opt/hf_cache}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_EXT_LINK=${OLLAMA_EXT_LINK:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gpt-oss:20b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
      - ./haystack_api/file-upload:/tmp/file-upload
    depends_on:
      - qdrant-server

  qdrant-server:
    image: qdrant:latest
    networks:
      - main-net
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - "6333"
      - "6334"
    environment:
      - QDRANT__TELEMETRY_DISABLED=${QDRANT__TELEMETRY_DISABLED:-true}
    volumes:
      - qdrant_data:/qdrant/storage

  haystack-worker:
    image: haystack_api:dev
    command: /usr/local/bin/haystack-worker-entry.sh
    networks:
      - main-net
    environment:
      - HAYSTACK_TELEMETRY_ENABLED=${HAYSTACK_TELEMETRY_ENABLED:-False}
      - QDRANT_HTTP_PORT=${QDRANT_HTTP_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant-server}
      - REDIS_HOST=${REDIS_HOST:-redis-server}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FILE_UPLOAD_PATH=/tmp/file-upload
      - HF_TOKEN=${HF_TOKEN:-}
      - PIPELINE_CONFIG=${PIPELINE_CONFIG:-en_gen}
      - LOCAL_MODEL_DIR=${LOCAL_MODEL_DIR:-}
      - HF_HOME=${HF_HOME:-/opt/hf_cache}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_EXT_LINK=${OLLAMA_EXT_LINK:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-1038baeeb57140219f3a118e07b0e301.yhqc-6UZa5WcBhcdsqwlCkSm}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gpt-oss:20b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - qdrant-server
      - redis-server
      - haystack-api
    volumes:
      - .:/app
      - ./haystack_api/file-upload:/tmp/file-upload

  redis-server:
    image: redis:alpine
    networks:
      - main-net
    ports:
      - '6379:6379'

  # ollama-server:
  #   image: ollama/ollama:latest
  #   networks:
  #     - main-net
  #   ports:
  #     - 11434:11434
  #   expose:
  #     - "11434"

volumes:
  qdrant_data:

networks:
  main-net:
    driver: bridge
